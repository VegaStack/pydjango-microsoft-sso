name: Build and Deploy Django MS SSO Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Build package
      run: python -m build
    
    - name: Create .pypirc file
      run: |
        echo "[distutils]" > ~/.pypirc
        echo "index-servers = gitlab" >> ~/.pypirc
        echo "[gitlab]" >> ~/.pypirc
        echo "repository = https://peerxp.vegaops.com/api/v4/projects/2188/packages/pypi" >> ~/.pypirc
        echo "username = ops-bot" >> ~/.pypirc
        echo "password = ${{ secrets.GITLAB_TOKEN }}" >> ~/.pypirc
    
    - name: Upload to GitLab
      run: python -m twine upload --repository gitlab --verbose --skip-existing dist/*
